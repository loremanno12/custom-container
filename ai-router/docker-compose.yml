services:
  ai-router:
    container_name: ai-router
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    init: true
    volumes:
      - ./models:/app/models
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
      MODEL_DIR: /app/models
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_DEVICE: cpu
      PYTHONUNBUFFERED: "1"
    networks:
      - internal_net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "health_check.py"]
      interval: 30s
      retries: 3
      start_period: 40s
      timeout: 10s
    restart: unless-stopped

networks:
  internal_net:
    external: true
